<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Catálogo Comercial | Grupo DP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #C0392B;
            --red-dark: #962d22;
            --bg-page: #f7f7f5;
            --text-main: #1c1b18;
            --text-muted: #6b6960;
            --radius: 20px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg-page); 
            color: var(--text-main);
            margin: 0; padding-bottom: 50px;
        }

        /* CAPA ADAPTÁVEL */
        .capa-container { width: 100%; max-width: 1200px; margin: 10px auto; padding: 0 15px; }
        .capa-wrapper { 
            width: 100%; background: #fff; border-radius: 30px; 
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border: 1px solid #eee;
        }
        .capa-img { width: 100%; display: block; height: 180px; object-fit: cover; }
        @media (min-width: 1024px) { .capa-img { height: 420px; object-fit: contain; } }

        /* HEADER E FILTROS */
        .sticky-header { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(247, 247, 245, 0.9); 
            backdrop-filter: blur(15px); padding: 15px;
            border-bottom: 1px solid #e2e2e2;
        }
        .search-box {
            width: 100%; max-width: 500px; margin: 0 auto 15px;
            padding: 12px 20px; border-radius: 15px;
            border: 1px solid #ddd; display: block; outline: none;
        }
        .filter-bar { 
            display: flex; gap: 8px; overflow-x: auto; 
            max-width: 1200px; margin: 0 auto; padding-bottom: 5px;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 8px 18px; border-radius: 50px; background: #fff;
            border: 1px solid #ddd; font-size: 13px; font-weight: 700;
            cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .chip.active { background: var(--red); color: #fff; border-color: var(--red); }
        .chip-promo { color: var(--red); border-color: var(--red); }
        .chip-promo.active { background: var(--red); color: #fff; }

        /* GRID 2 COLUNAS MOBILE / 4 COLUNAS PC */
        .grid-produtos {
            display: grid; max-width: 1200px; margin: 20px auto; padding: 0 15px;
            grid-template-columns: repeat(2, 1fr); gap: 15px;
        }
        @media (min-width: 1024px) {
            .grid-produtos { grid-template-columns: repeat(4, 1fr); gap: 25px; }
        }

        /* CARD */
        .card {
            background: #fff; border-radius: var(--radius); padding: 12px;
            border: 1px solid #efefef; transition: 0.3s; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--red); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 12px; background: #f9f9f9; }
        .cod-text { font-size: 10px; font-weight: 800; color: var(--red); margin-top: 8px; display: block; }
        .card-title { font-size: 13px; font-weight: 800; margin: 4px 0; text-transform: uppercase; height: 32px; overflow: hidden; }

        /* MODAL */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal {
            background: #fff; width: 100%; max-width: 500px; border-radius: 30px;
            position: relative; overflow-y: auto; max-height: 90vh; padding: 25px;
        }
        .btn-close { position: absolute; top: 20px; right: 20px; border: none; background: #eee; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; cursor: pointer; }
        .modal-img { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        .modal-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 10px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="capa-container">
        <div class="capa-wrapper">
            <img src="https://i.postimg.cc/4xgLXKHh/Gemini-Generated-Image-q2fofcq2fofcq2fo.png" class="capa-img">
        </div>
    </div>

    <div class="sticky-header">
        <input type="text" id="search" placeholder="Pesquisar por nome ou código..." class="search-box">
        <div class="filter-bar">
            <div class="chip active" onclick="setFiltro('empresa', 'TODOS', this)">Todos</div>
            <div class="chip" onclick="setFiltro('empresa', 'ACREAVES', this)">Acreaves</div>
            <div class="chip" onclick="setFiltro('empresa', 'Dom Porquito', this)">Dom Porquito</div>
            <div class="chip" onclick="setFiltro('empresa', 'Fripal', this)">Fripal</div>
            <div class="chip chip-promo" onclick="setFiltro('promo', true, this)">Promoções %</div>
        </div>
    </div>

    <main id="grid-produtos" class="grid-produtos"></main>

    <div id="overlay" onclick="fecharModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="btn-close" onclick="fecharModal()">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="produtos.js"></script>
    <script>
        let busca = "";
        let filtroAtivo = { empresa: 'TODOS', promo: false };

        function setFiltro(tipo, valor, el) {
            if(tipo === 'promo') {
                filtroAtivo.promo = !filtroAtivo.promo;
                el.classList.toggle('active');
            } else {
                filtroAtivo.empresa = valor;
                document.querySelectorAll('.chip:not(.chip-promo)').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
            }
            filtrar();
        }

        function filtrar() {
            const container = document.getElementById('grid-produtos');
            const filtrados = PRODUTOS.filter(p => {
                const matchBusca = p.nome.toLowerCase().includes(busca.toLowerCase()) || p.cod.includes(busca);
                const matchEmpresa = filtroAtivo.empresa === 'TODOS' || p.empresa === filtroAtivo.empresa;
                const matchPromo = !filtroAtivo.promo || p.promo === true;
                return matchBusca && matchEmpresa && matchPromo;
            });

            container.innerHTML = filtrados.map((p, index) => `
                <div class="card shadow-sm" onclick="abrirModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    <img src="${p.imgs[0]}" loading="lazy">
                    <span class="cod-text">CÓD. ${p.cod}</span>
                    <h3 class="card-title">${p.nome}</h3>
                    <p style="font-size: 11px; color: #888; font-weight: 700;">${p.marca}</p>
                </div>
            `).join('');
        }

        function abrirModal(p) {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <img src="${p.imgs[0]}" class="modal-img">
                <span class="modal-tag" style="background:#fdf0ee; color:var(--red)">CÓD. ${p.cod}</span>
                <span class="modal-tag" style="background:#eee;">${p.empresa}</span>
                <h2 style="font-size:22px; font-weight:800; margin:10px 0; text-transform:uppercase;">${p.nome}</h2>
                <p style="color:#666; font-size:14px; line-height:1.5; margin-bottom:20px;">${p.desc || 'Sem descrição disponível.'}</p>
                <div style="background:#f9f9f9; padding:15px; border-radius:15px; font-size:13px;">
                    <p><b>Marca:</b> ${p.marca}</p>
                    <p><b>Peso:</b> ${p.peso || 'N/A'}</p>
                    <p><b>Embalagem:</b> ${p.embalagem || 'N/A'}</p>
                    <p><b>Conservação:</b> ${p.conserva || 'N/A'}</p>
                </div>
            `;
            document.getElementById('overlay').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('overlay').style.display = 'none'; }

        document.getElementById('search').addEventListener('input', (e) => { busca = e.target.value; filtrar(); });
        window.onload = filtrar;
    </script>
</body>
</html>
