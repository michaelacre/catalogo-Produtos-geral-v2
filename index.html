<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Catálogo Comercial | Grupo DP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #C0392B;
            --red-dark: #962d22;
            --bg-page: #f7f7f5;
            --text-main: #1c1b18;
            --text-muted: #6b6960;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg-page); 
            color: var(--text-main);
            margin: 0; padding: 0;
        }

        /* 1. CAPA INTELIGENTE */
        .capa-container {
            width: 100%;
            max-width: 1200px;
            margin: 16px auto;
            padding: 0 16px;
        }
        .capa-wrapper {
            width: 100%;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e8e6e1;
        }
        .capa-img {
            width: 100%;
            display: block;
            /* No celular: foca no centro */
            height: 200px;
            object-fit: cover;
        }
        @media (min-width: 1024px) {
            .capa-img {
                /* No PC: mostra a arte inteira */
                height: 450px;
                object-fit: contain;
            }
        }

        /* 2. FILTROS E BUSCA */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(247, 247, 245, 0.8);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-bottom: 1px solid #e8e6e1;
        }
        .search-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid #d8d6d0;
            background: #fff;
            font-size: 16px;
            outline: none;
            display: block;
        }

        /* 3. GRID DE PRODUTOS (O DESAFIO) */
        .grid-produtos {
            display: grid;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
            /* Padrão celular: 2 colunas */
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 1024px) {
            .grid-produtos {
                /* No PC: 4 colunas cravadas */
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
            }
        }

        /* CARD DE PRODUTO */
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 12px;
            transition: transform 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--red); }
        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            background: #f9f9f9;
            border-radius: 14px;
        }
        .card-info { margin-top: 12px; }
        .cod-tag {
            font-size: 10px;
            font-weight: 800;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 800;
            margin: 4px 0;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-transform: uppercase;
        }
        @media (min-width: 1024px) {
            .card-title { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="capa-container">
        <div class="capa-wrapper">
            <img src="https://i.postimg.cc/4xgLXKHh/Gemini-Generated-Image-q2fofcq2fofcq2fo.png" class="capa-img" alt="Capa Grupo DP">
        </div>
    </div>

    <div class="sticky-header">
        <input type="text" id="search" placeholder="O que você procura hoje?" class="search-box">
    </div>

    <main id="grid-produtos" class="grid-produtos">
        </main>

    <script src="produtos.js"></script>

    <script>
        let busca = "";

        function filtrar() {
            const container = document.getElementById('grid-produtos');
            
            // Filtra por nome ou código
            const filtrados = PRODUTOS.filter(p => 
                p.nome.toLowerCase().includes(busca.toLowerCase()) || 
                p.cod.includes(busca)
            );

            container.innerHTML = filtrados.map(p => `
                <div class="card shadow-sm">
                    <img src="${p.imgs[0]}" alt="${p.nome}" loading="lazy">
                    <div class="card-info">
                        <span class="cod-tag">CÓD. ${p.cod}</span>
                        <h3 class="card-title">${p.nome}</h3>
                        <p style="font-size: 11px; color: #888; font-weight: bold;">${p.marca} | ${p.empresa}</p>
                    </div>
                </div>
            `).join('');
        }

        // Evento de Busca
        document.getElementById('search').addEventListener('input', (e) => {
            busca = e.target.value;
            filtrar();
        });

        // Inicialização
        window.onload = filtrar;
    </script>
</body>
</html>
