<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Catálogo Comercial | Acreaves · Dom Porquito · Fripal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red-dark:#962d22;--bg-page:#f4f3f0;--bg-surface:#fff;--bg-card:#fff;--bg-header:#111110;--bg-filter:#fff;--bg-img:#f0efeb;--text-primary:#1c1b18;--text-secondary:#6b6960;--text-muted:#b5b3ab;--border:#e8e6e1;--border-md:#d8d6d0;--shadow-sm:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 6px 20px rgba(0,0,0,.09);--radius-sm:10px;--radius-md:16px;--radius-lg:22px;--radius-xl:32px}
[data-theme="dark"]{--bg-page:#0f0e0c;--bg-surface:#1c1b18;--bg-card:#242320;--bg-header:#080807;--bg-filter:#1c1b18;--bg-img:#2a2927;--text-primary:#f0efe9;--text-secondary:#9a9890;--text-muted:#58564f;--border:#2c2b28;--border-md:#38372f;--shadow-sm:0 1px 4px rgba(0,0,0,.3);--shadow-md:0 6px 20px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;padding-bottom:48px;overscroll-behavior:none;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,#1a1310 0%,#2d2419 50%,#1a1310 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity .5s ease,visibility .5s ease;padding:40px 20px}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-bg-container{position:absolute;inset:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.splash-bg{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;opacity:.85}
.splash-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.35) 40%,rgba(0,0,0,.7) 70%,rgba(0,0,0,.93) 100%)}
.splash-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:600px;text-align:center;animation:slideUpFade .8s ease-out .3s both}
@keyframes slideUpFade{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.splash-eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:14px}
.splash-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(32px,9vw,52px);color:#fff;letter-spacing:-.8px;line-height:1.05;margin-bottom:8px}
.splash-sub{font-size:15px;color:rgba(255,255,255,.65);letter-spacing:.3px;margin-bottom:48px;line-height:1.5}
.splash-btn{background:var(--red);color:#fff;border:none;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;padding:16px 52px;border-radius:100px;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 12px 40px rgba(192,57,43,.4);transition:all .3s cubic-bezier(.34,1.56,.64,1);animation:popIn .6s cubic-bezier(.34,1.56,.64,1) .6s both}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.splash-btn:hover{background:var(--red-dark);transform:translateY(-3px);box-shadow:0 16px 50px rgba(192,57,43,.5)}
.splash-btn:active{transform:scale(.96)}
.splash-arrow{transition:transform .2s}.splash-btn:hover .splash-arrow{transform:translateX(8px)}

/* HEADER */
.header{background:var(--bg-header);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;min-height:52px;gap:10px;border-bottom:1px solid rgba(255,255,255,.04)}
.header-logo{display:flex;flex-direction:column;flex-shrink:0;min-width:0}
.header-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.2px;line-height:1.1;white-space:nowrap}
.header-subs{display:flex;align-items:center;gap:5px;margin-top:3px}
.header-sub-chip{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:5px;white-space:nowrap}
.chip-acreaves{background:rgba(30,126,90,.22);color:#5ecba1}
.chip-dom{background:rgba(192,57,43,.22);color:#f0836f}
.chip-fripal{background:rgba(26,111,168,.22);color:#6db8f0}
.search-wrap{flex:1;max-width:280px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.28);pointer-events:none}
#search{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px 7px 32px;outline:none;transition:background .2s,border-color .2s}
#search::placeholder{color:rgba(255,255,255,.28)}
#search:focus{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.2)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
#count-badge{font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap;display:none}
@media(min-width:480px){#count-badge{display:block}}
.theme-btn{width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.theme-btn:hover{background:rgba(255,255,255,.12);color:#fff}
[data-theme="light"] .icon-moon{display:none}[data-theme="dark"] .icon-sun{display:none}

/* FILTROS */
.filters-outer{background:var(--bg-filter);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90;padding:12px 16px 10px;transition:background .3s,border-color .3s}

/* ROW 1 — empresa cards COM LOGOS */
.empresa-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;margin-bottom:12px;border-bottom:1px solid var(--border);align-items:flex-start}
.empresa-row::-webkit-scrollbar{display:none}
.empresa-card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;background:transparent;border:2px solid var(--border);border-radius:var(--radius-md);padding:10px 14px 10px;cursor:pointer;transition:all .2s ease;min-width:85px;user-select:none}
.empresa-card:hover{border-color:var(--border-md);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.empresa-card.active{border-color:var(--red);background:var(--bg-surface);box-shadow:0 3px 16px rgba(192,57,43,.18)}
.empresa-card-logo{width:60px;height:40px;object-fit:contain;display:block}
.empresa-card-fb{width:60px;height:40px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:var(--text-secondary);text-align:center;line-height:1.2}
.empresa-card-nome{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);text-align:center;white-space:normal;max-width:80px}
.empresa-card.active .empresa-card-nome{color:var(--red);font-weight:800}
.empresa-card-todas .empresa-card-fb{font-size:24px}

/* ROW 2 — tipo chips */
.tipo-row{display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none}
.tipo-row::-webkit-scrollbar{display:none}
.filter-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap;flex-shrink:0;padding-right:2px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;border:1.5px solid var(--border-md);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text-secondary);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;-webkit-user-select:none}
.chip:hover{border-color:var(--text-muted);color:var(--text-primary)}
.chip.active{background:var(--text-primary);border-color:var(--text-primary);color:var(--bg-surface)}
.chip.active-red{background:var(--red);border-color:var(--red);color:#fff}

/* RESULTS */
.results-header{padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between}
.results-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px}
.results-count{font-size:12px;color:var(--text-muted)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:8px 14px 24px;max-width:1200px;margin:0 auto}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;padding:12px 20px 32px}}

/* CARD */
.card{background:var(--bg-card);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;border:1px solid var(--border)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}.card:active{transform:scale(.97)}
.card-img-wrap{position:relative;width:100%;aspect-ratio:1/1;background:var(--bg-img);overflow:hidden}
.card-img{width:100%;height:100%;object-fit:contain;display:block;padding:8px;transition:transform .3s ease}
.card:hover .card-img{transform:scale(1.04)}
.card-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px}
.badge-cod{background:rgba(17,17,16,.72);color:#fff;font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;backdrop-filter:blur(4px)}
.badge-promo{background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;text-transform:uppercase;animation:blink 2.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}
.badge-tipo{position:absolute;bottom:8px;right:8px;font-size:8px;font-weight:600;padding:2px 7px;border-radius:6px;text-transform:uppercase}
.tipo-CONGELADO{background:#dceefa;color:#1a5a90}.tipo-RESFRIADO{background:#ddeaf7;color:#155080}
.tipo-TEMPERADO{background:#feecd4;color:#a05a10}.tipo-DEFUMADOS{background:#f0e8de;color:#7a5030}
[data-theme="dark"] .tipo-CONGELADO{background:rgba(26,90,144,.3);color:#7bc4f5}
[data-theme="dark"] .tipo-RESFRIADO{background:rgba(21,80,128,.3);color:#6ab4f0}
[data-theme="dark"] .tipo-TEMPERADO{background:rgba(160,90,16,.3);color:#f5b46a}
[data-theme="dark"] .tipo-DEFUMADOS{background:rgba(122,80,48,.3);color:#d4a07a}
.card-body{padding:10px 12px 12px}
.card-marca{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.card-nome{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text-primary);line-height:1.3;min-height:2.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-transform:uppercase}
.card-footer{margin-top:8px;display:flex;align-items:center;justify-content:space-between;background:var(--bg-page);border-radius:9px;padding:5px 9px;border:1px solid var(--border)}
.card-peso{font-size:10px;font-weight:600;color:var(--text-secondary)}
.card-btn{width:20px;height:20px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* DIVIDERS */
.emp-header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:6px 0 2px}
.emp-line{flex:1;height:1px;background:var(--border)}
.emp-badge{font-family:'Syne',sans-serif;font-size:9px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text-secondary);margin-bottom:6px}
.empty p{font-size:13px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(10,9,8,.87);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s ease}
.overlay.open{opacity:1;pointer-events:all}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--bg-surface);width:100%;max-width:500px;border-radius:var(--radius-xl) var(--radius-xl) 0 0;overflow:hidden;transform:translateY(40px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:92vh;display:flex;flex-direction:column;border:1px solid var(--border)}
.overlay.open .modal{transform:translateY(0)}
@media(min-width:600px){.modal{border-radius:var(--radius-xl);max-height:88vh}}
.modal-drag{width:40px;height:4px;background:var(--border-md);border-radius:2px;margin:12px auto 0;flex-shrink:0}
@media(min-width:600px){.modal-drag{display:none}}
.gallery{position:relative;background:var(--bg-img);flex-shrink:0;overflow:hidden}
.gallery-slides{display:flex;transition:transform .3s ease}
.gallery-slide{min-width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;padding:16px}
.gallery-slide img{width:100%;height:100%;object-fit:contain;display:block}
.g-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(17,17,16,.5);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:background .15s}
.g-nav:hover{background:rgba(17,17,16,.8)}.g-nav.prev{left:10px}.g-nav.next{right:10px}.g-nav.hidden{display:none}
.g-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.g-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:background .15s,transform .15s}
.g-dot.active{background:#fff;transform:scale(1.35)}
.modal-close{position:absolute;top:10px;right:10px;background:rgba(17,17,16,.5);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px)}
.modal-body{padding:18px 20px 28px;overflow-y:auto;flex:1}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.m-tag{font-size:9px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
.m-tag-cod{background:var(--text-primary);color:var(--bg-surface)}
.m-tag-emp{background:var(--bg-page);color:var(--text-secondary);border:1px solid var(--border-md)}
.m-tag-promo{background:var(--red);color:#fff}
.modal-nome{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--text-primary);line-height:1.2;text-transform:uppercase;margin-bottom:10px;letter-spacing:-.3px}
.modal-desc{font-size:13px;line-height:1.65;color:var(--text-secondary);padding-left:12px;border-left:3px solid var(--border-md);margin-bottom:18px}
.modal-specs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spec-card{background:var(--bg-page);border-radius:var(--radius-sm);padding:11px;text-align:center;border:1px solid var(--border)}
.spec-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block}
.spec-val{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text-primary);line-height:1.3;display:block}
.conserva-icon{font-size:16px;display:block;margin-bottom:2px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" role="dialog">
  <div class="splash-bg-container">
    <img class="splash-bg" src="https://i.postimg.cc/FRpmx5ty/CAPA-UNIFICADA.png" alt="Catálogo Comercial">
  </div>
  <div class="splash-grad"></div>
  <div class="splash-content">
    <p class="splash-eyebrow">Grupo DP</p>
    <h1 class="splash-title">Catálogo Comercial</h1>
    <p class="splash-sub">Acreaves · Dom Porquito · Fripal</p>
    <button class="splash-btn" id="btn-entrar">Explorar Catálogo <span class="splash-arrow">→</span></button>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <span class="header-title">Catálogo Comercial</span>
    <div class="header-subs">
      <span class="header-sub-chip chip-acreaves">Acreaves</span>
      <span class="header-sub-chip chip-dom">Dom Porquito</span>
      <span class="header-sub-chip chip-fripal">Fripal</span>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="search" placeholder="Buscar produto ou código…" autocomplete="off">
  </div>
  <div class="header-right">
    <span id="count-badge">0 itens</span>
    <button class="theme-btn" id="btn-theme" aria-label="Tema claro/escuro">
      <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- FILTROS -->
<div class="filters-outer">

  <!-- ROW 1: Empresa com logo (estilo Aurora) -->
  <div class="empresa-row" id="empresa-row">

    <div class="empresa-card empresa-card-todas active" data-empresa="TUDO">
      <div class="empresa-card-fb">⊞</div>
      <span class="empresa-card-nome">Todas</span>
    </div>

    <div class="empresa-card" data-empresa="ACREAVES">
      <img class="empresa-card-logo" src="https://i.postimg.cc/ydjBT4qc/logo-acreaves.png" alt="Acreaves">
      <span class="empresa-card-nome">Acreaves</span>
    </div>

    <div class="empresa-card" data-empresa="Dom Porquito">
      <img class="empresa-card-logo" src="https://i.postimg.cc/769DN8vS/LOGO-DOMPORQUITO.png" alt="Dom Porquito">
      <span class="empresa-card-nome">Dom Porquito</span>
    </div>

    <div class="empresa-card" data-empresa="Fripal">
      <img class="empresa-card-logo" src="https://i.postimg.cc/769DN8vM/FRIPAL-LOGO.jpg" alt="Fripal">
      <span class="empresa-card-nome">Fripal</span>
    </div>

  </div>

  <!-- ROW 2: Tipo -->
  <div class="tipo-row">
    <span class="filter-label">Tipo</span>
    <button class="chip active" data-filter="tipo" data-val="TUDO">Todos</button>
    <button class="chip" data-filter="tipo" data-val="CONGELADO">❄ Congelado</button>
    <button class="chip" data-filter="tipo" data-val="RESFRIADO">🧊 Resfriado</button>
    <button class="chip" data-filter="tipo" data-val="TEMPERADO">🌿 Temperado</button>
    <button class="chip" data-filter="tipo" data-val="DEFUMADOS">🔥 Defumados</button>
    <button class="chip" data-filter="grupo" data-val="FATIADO">🔪 Fatiados</button>
    <button class="chip" data-filter="grupo" data-val="LINGUIÇAS">🌭 Linguiças</button>
    <button class="chip" id="chip-promo" data-filter="promo" data-val="SIM" style="border-color:var(--red);color:var(--red)">★ Promoção</button>
  </div>

</div>

<!-- RESULTS -->
<div class="results-header">
  <span class="results-title" id="results-title">Todos os produtos</span>
  <span class="results-count" id="results-count"></span>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <span class="modal-drag"></span>
    <div class="gallery" id="modal-gallery">
      <button class="modal-close" id="btn-close">✕</button>
      <div class="gallery-slides" id="g-slides"></div>
      <button class="g-nav prev hidden" id="g-prev"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="g-nav next hidden" id="g-next"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      <div class="g-dots" id="g-dots"></div>
    </div>
    <div class="modal-body">
      <div class="modal-tags" id="m-tags"></div>
      <h2 class="modal-nome" id="m-nome"></h2>
      <p class="modal-desc" id="m-desc"></p>
      <div class="modal-specs">
        <div class="spec-card"><span class="spec-label">Embalagem</span><span class="spec-val" id="m-emb"></span></div>
        <div class="spec-card"><span class="spec-label">Peso / Cx</span><span class="spec-val" id="m-peso"></span></div>
        <div class="spec-card" style="grid-column:1/-1"><span class="spec-label">Conservação</span><span class="conserva-icon" id="m-icon"></span><span class="spec-val" id="m-conserva"></span></div>
        <div class="spec-card"><span class="spec-label">Empresa</span><span class="spec-val" id="m-empresa"></span></div>
        <div class="spec-card"><span class="spec-label">Marca</span><span class="spec-val" id="m-marca"></span></div>
      </div>
    </div>
  </div>
</div>

<script src="produtos.js"></script>
<script>
const html=document.documentElement;
const savedTheme=localStorage.getItem('dp-theme')||'light';
html.setAttribute('data-theme',savedTheme);
document.getElementById('btn-theme').addEventListener('click',()=>{
  const next=html.getAttribute('data-theme')==='light'?'dark':'light';
  html.setAttribute('data-theme',next);localStorage.setItem('dp-theme',next);
});

const splash=document.getElementById('splash');
if(sessionStorage.getItem('dp-splash')){splash.classList.add('hidden')}
else{document.body.style.overflow='hidden'}
document.getElementById('btn-entrar').addEventListener('click',()=>{
  sessionStorage.setItem('dp-splash','1');splash.classList.add('hidden');document.body.style.overflow='';
});

let filtros={empresa:'TUDO',tipo:'TUDO',grupo:'TUDO',promo:false};
let busca='',galIdx=0,galImgs=[];
const ICON={CONGELADO:'❄',RESFRIADO:'🧊',TEMPERADO:'🌿',DEFUMADOS:'🔥'};

function filtrar(){
  let lista=PRODUTOS;
  if(filtros.empresa!=='TUDO')lista=lista.filter(p=>p.empresa===filtros.empresa);
  if(filtros.promo){lista=lista.filter(p=>p.promo===true)}
  else{
    if(filtros.tipo!=='TUDO')lista=lista.filter(p=>p.tipo===filtros.tipo);
    if(filtros.grupo!=='TUDO')lista=lista.filter(p=>p.grupo===filtros.grupo);
  }
  if(busca.trim()){const q=busca.toLowerCase();lista=lista.filter(p=>p.nome.toLowerCase().includes(q)||String(p.cod).includes(q)||(p.marca&&p.marca.toLowerCase().includes(q)))}
  renderGrid(lista);
  document.getElementById('count-badge').textContent=lista.length+(lista.length===1?' item':' itens');
  let t='Todos os produtos';
  if(filtros.promo)t='★ Em promoção';
  else if(filtros.empresa!=='TUDO')t=filtros.empresa;
  if(filtros.tipo!=='TUDO'&&!filtros.promo)t+=' · '+filtros.tipo;
  if(filtros.grupo!=='TUDO'&&!filtros.promo)t+=' · '+filtros.grupo;
  document.getElementById('results-title').textContent=t;
  document.getElementById('results-count').textContent=lista.length+' produto'+(lista.length!==1?'s':'');
}

function renderGrid(lista){
  const grid=document.getElementById('grid');
  if(!lista.length){grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h3>Nenhum produto encontrado</h3><p>Tente outros filtros ou limpe a busca.</p></div>';return}
  const grupos={};lista.forEach(p=>{if(!grupos[p.empresa])grupos[p.empresa]=[];grupos[p.empresa].push(p)});
  const showSep=Object.keys(grupos).length>1;
  let out='';
  Object.entries(grupos).forEach(([emp,prods])=>{
    if(showSep)out+=`<div class="emp-header"><span class="emp-line"></span><span class="emp-badge">${emp}</span><span class="emp-line"></span></div>`;
    prods.forEach(p=>{
      const img=(p.imgs&&p.imgs[0])?p.imgs[0]:'';
      out+=`<div class="card" onclick="abrirModal('${p.cod}')" role="button" tabindex="0" aria-label="${p.nome}">
        <div class="card-img-wrap">
          <img class="card-img" src="${img}" alt="${p.nome}" loading="lazy">
          <div class="card-badges"><span class="badge-cod">${p.cod}</span>${p.promo?'<span class="badge-promo">Promoção</span>':''}</div>
          <span class="badge-tipo tipo-${p.tipo}">${p.tipo}</span>
        </div>
        <div class="card-body">
          <div class="card-marca">${p.marca||''}</div>
          <div class="card-nome">${p.nome}</div>
          <div class="card-footer"><span class="card-peso">${p.embalagem||p.peso}</span>
            <span class="card-btn"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
          </div>
        </div>
      </div>`;
    });
  });
  grid.innerHTML=out;
}

function abrirModal(cod){
  const p=PRODUTOS.find(x=>x.cod===cod);if(!p)return;
  galImgs=p.imgs||[];galIdx=0;renderGaleria();
  document.getElementById('m-tags').innerHTML=`<span class="m-tag m-tag-cod">${p.cod}</span><span class="m-tag m-tag-emp">${p.empresa}</span>${p.promo?'<span class="m-tag m-tag-promo">★ Promoção</span>':''}`;
  document.getElementById('m-nome').textContent=p.nome;
  document.getElementById('m-desc').textContent=p.desc||'';
  document.getElementById('m-emb').textContent=p.embalagem||'—';
  document.getElementById('m-peso').textContent=p.peso||'—';
  document.getElementById('m-conserva').textContent=p.conserva||'—';
  document.getElementById('m-icon').textContent=ICON[p.tipo]||'📦';
  document.getElementById('m-empresa').textContent=p.empresa;
  document.getElementById('m-marca').textContent=p.marca||'—';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function fecharModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}

function renderGaleria(){
  const slides=document.getElementById('g-slides');const dots=document.getElementById('g-dots');
  slides.innerHTML=galImgs.map((url,i)=>`<div class="gallery-slide"><img src="${url}" alt="Foto ${i+1}" loading="${i===0?'eager':'lazy'}"></div>`).join('');
  dots.innerHTML=galImgs.length>1?galImgs.map((_,i)=>`<span class="g-dot${i===0?' active':''}" onclick="irSlide(${i})"></span>`).join(''):'';
  document.getElementById('g-prev').classList.toggle('hidden',galImgs.length<=1);
  document.getElementById('g-next').classList.toggle('hidden',galImgs.length<=1);
  irSlide(0);
}
function irSlide(idx){
  galIdx=Math.max(0,Math.min(idx,galImgs.length-1));
  document.getElementById('g-slides').style.transform=`translateX(-${galIdx*100}%)`;
  document.querySelectorAll('.g-dot').forEach((d,i)=>d.classList.toggle('active',i===galIdx));
  document.getElementById('g-prev').classList.toggle('hidden',galIdx===0||galImgs.length<=1);
  document.getElementById('g-next').classList.toggle('hidden',galIdx===galImgs.length-1||galImgs.length<=1);
}
document.getElementById('g-prev').onclick=()=>irSlide(galIdx-1);
document.getElementById('g-next').onclick=()=>irSlide(galIdx+1);
(function(){let sx=0,sy=0;const gal=document.getElementById('modal-gallery');
  gal.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  gal.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;const dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)irSlide(galIdx+(dx<0?1:-1))},{passive:true});
})();

document.querySelectorAll('.empresa-card').forEach(card=>{
  card.addEventListener('click',()=>{
    document.querySelectorAll('.empresa-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');filtros.empresa=card.dataset.empresa;
    filtros.promo=false;
    const pc=document.getElementById('chip-promo');
    pc.classList.remove('active-red');pc.style.color='var(--red)';pc.style.borderColor='var(--red)';
    filtrar();
  });
});

document.querySelectorAll('.chip[data-filter]').forEach(chip=>{
  chip.addEventListener('click',()=>{
    const filter=chip.dataset.filter;const val=chip.dataset.val;
    if(filter==='promo'){
      filtros.promo=!filtros.promo;
      chip.classList.toggle('active-red',filtros.promo);
      chip.style.color=filtros.promo?'':'var(--red)';chip.style.borderColor=filtros.promo?'':'var(--red)';
    }else{
      filtros.promo=false;
      const pc=document.getElementById('chip-promo');pc.classList.remove('active-red');pc.style.color='var(--red)';pc.style.borderColor='var(--red)';
      filtros[filter]=val;
      if(filter==='tipo')filtros.grupo='TUDO';
      if(filter==='grupo')filtros.tipo='TUDO';
      document.querySelectorAll('.chip[data-filter="tipo"],.chip[data-filter="grupo"]').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
    }
    filtrar();
  });
});

document.getElementById('search').addEventListener('input',e=>{busca=e.target.value;filtrar()});
document.getElementById('btn-close').addEventListener('click',fecharModal);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))fecharModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')fecharModal()});

filtrar();
</script>
</body>
</html>
